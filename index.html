<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>wosa — a secure runtime for microVMs &amp; WASM</title>
<meta name="description" content="wosa is a secure runtime that spawns isolated worlds: Firecracker microVMs, WASM modules, and more — each in its own boundary, booting in milliseconds." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />

<style>
  /* ── Rosé Pine Dawn ─────────────────────────────────────────── */
  :root{
    --base:#faf4ed;
    --surface:#fffaf3;
    --overlay:#f2e9e1;
    --hl-low:#f4ede8;
    --hl-med:#dfdad9;
    --muted:#9893a5;
    --subtle:#797593;
    --text:#575279;
    --love:#b4637a;
    --gold:#ea9d34;
    --rose:#d7827e;
    --pine:#286983;
    --foam:#56949f;
    --iris:#907aa9;

    --radius:8px;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    font-family:var(--mono);
    background:var(--base);
    background-image:radial-gradient(circle at 1px 1px, rgba(144,122,169,0.05) 1px, transparent 0);
    background-size:24px 24px;
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    padding:32px 20px;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--iris);color:var(--surface);}
  :focus-visible{outline:2px solid var(--iris);outline-offset:3px;border-radius:3px;}

  .stage{width:100%;max-width:560px;text-align:center;}

  /* wordmark */
  .mark{
    display:inline-flex;align-items:center;gap:9px;
    font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--subtle);
    margin-bottom:26px;
  }
  .mark .dot{
    width:9px;height:9px;border-radius:50%;background:var(--pine);
    box-shadow:0 0 8px rgba(40,105,131,.5);
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{50%{box-shadow:0 0 14px rgba(40,105,131,.8);opacity:.55;}}

  h1{
    font-size:clamp(46px,12vw,84px);line-height:1;letter-spacing:-0.05em;
    font-weight:800;margin:0 0 18px;color:var(--text);
  }
  h1 .cursor{
    display:inline-block;width:.5ch;height:.82em;background:var(--iris);
    margin-left:6px;vertical-align:-0.04em;animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .desc{
    font-size:15px;line-height:1.65;color:var(--subtle);
    max-width:42ch;margin:0 auto 34px;
  }
  .desc b{color:var(--text);font-weight:500;}
  .desc .i{color:var(--iris);font-weight:500;}

  /* ── signature animation pane ───────────────────────────────── */
  .pane{
    border:1px solid var(--hl-med);border-radius:var(--radius);
    background:var(--surface);text-align:left;overflow:hidden;
    box-shadow:0 18px 50px -28px rgba(87,82,121,.45);
    position:relative;
  }
  /* power-on light sweep */
  .pane::after{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:var(--radius);
    background:linear-gradient(115deg,transparent 32%,rgba(144,122,169,.14) 50%,transparent 68%);
    transform:translateX(-120%);
    animation:sweep 1.5s ease-out .5s 1 both;
  }
  @keyframes sweep{to{transform:translateX(120%);}}

  .pane-head{
    display:flex;align-items:center;gap:8px;padding:9px 14px;
    border-bottom:1px solid var(--hl-med);background:var(--overlay);
    font-size:12px;color:var(--muted);
  }
  .tt{display:flex;gap:6px;}
  .tt i{width:9px;height:9px;border-radius:50%;display:block;}
  .tt .r{background:var(--love);} .tt .y{background:var(--gold);} .tt .g{background:var(--pine);}
  .path{margin-left:4px;color:var(--subtle);}
  .path b{color:var(--iris);font-weight:500;}

  .pane-body{padding:24px;display:flex;flex-direction:column;gap:16px;}

  .boot-row{display:flex;align-items:center;gap:10px;font-size:12.5px;}
  .boot-row .lbl{color:var(--subtle);min-width:60px;}
  .boot-row .lbl b{color:var(--text);font-weight:500;}
  .track{flex:1;height:8px;border-radius:99px;background:var(--hl-med);position:relative;overflow:hidden;}
  .track .fill{
    position:absolute;inset:0;width:0;border-radius:99px;
    background:linear-gradient(90deg,var(--iris),var(--foam));
    animation:fill 2.4s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .track.f2 .fill{animation-delay:.5s;background:linear-gradient(90deg,var(--foam),var(--pine));}
  .track.f3 .fill{animation-delay:1s;background:linear-gradient(90deg,var(--pine),var(--gold));}
  @keyframes fill{to{width:100%;}}
  .boot-row .ms{color:var(--muted);min-width:46px;text-align:right;font-variant-numeric:tabular-nums;}

  /* worlds isolation grid */
  .worlds{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-top:2px;}
  .cell{
    aspect-ratio:1;border-radius:3px;border:1px solid var(--hl-med);
    background:var(--hl-low);transition:.2s;
  }
  .cell.on{border-color:var(--iris);background:rgba(144,122,169,.16);}
  .cell:hover{border-color:var(--foam);background:rgba(86,148,159,.16);}

  .boot-foot{
    margin-top:4px;border-top:1px solid var(--hl-med);padding-top:16px;
    display:flex;align-items:baseline;gap:10px;
  }
  .boot-foot .big{
    font-size:36px;font-weight:800;letter-spacing:-0.04em;color:var(--pine);line-height:1;
    animation:settle .5s ease-out 2.4s both;
  }
  @keyframes settle{40%{text-shadow:0 0 18px rgba(40,105,131,.4);}}
  .boot-foot .cap{font-size:12px;color:var(--muted);}

  /* ── github link ────────────────────────────────────────────── */
  .gh{
    display:inline-flex;align-items:center;gap:9px;margin-top:30px;
    padding:11px 18px;border-radius:var(--radius);
    border:1px solid var(--hl-med);background:var(--surface);
    font-size:14px;font-weight:700;color:var(--text);
    transition:.18s;
  }
  .gh:hover{border-color:var(--iris);color:var(--iris);transform:translateY(-2px);
    box-shadow:0 10px 24px -16px rgba(144,122,169,.6);}
  .gh svg{width:17px;height:17px;}

  /* ── load reveal ────────────────────────────────────────────── */
  [data-reveal]{
    opacity:0;transform:translateY(18px);
    transition:opacity .7s ease, transform .7s cubic-bezier(.2,.8,.2,1);
    transition-delay:var(--d,0s);
  }
  [data-reveal="scale"]{transform:scale(.97);}
  [data-reveal].is-in{opacity:1;transform:none;}

  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;}
    .track .fill{width:100%!important;}
    .pane::after{display:none;}
    [data-reveal]{opacity:1!important;transform:none!important;}
    h1 .cursor{opacity:1;}
  }
</style>
</head>
<body>

<div class="stage">

  <span class="mark" data-reveal style="--d:.1s"><span class="dot"></span>wosa.dev</span>

  <h1 data-reveal style="--d:.2s">wosa<span class="cursor"></span></h1>

  <p class="desc" data-reveal style="--d:.32s">
  Unified sandbox runtime.
  </p>

  <!-- signature: boot timeline + worlds grid -->
  <div class="pane" data-reveal="scale" style="--d:.44s">
    <div class="pane-head">
      <span class="tt"><i class="r"></i><i class="y"></i><i class="g"></i></span>
      <span class="path">wosa://<b>spawn elliot</b></span>
    </div>
    <div class="pane-body">
      <div class="boot-row"><span class="lbl"><b>kernel</b></span><div class="track"><span class="fill"></span></div><span class="ms">+0ms</span></div>
      <div class="boot-row"><span class="lbl"><b>rootfs</b></span><div class="track f2"><span class="fill"></span></div><span class="ms">+41ms</span></div>
      <div class="boot-row"><span class="lbl"><b>init</b></span><div class="track f3"><span class="fill"></span></div><span class="ms">+89ms</span></div>

      <div class="worlds" id="worlds" aria-hidden="true"></div>

      <div class="boot-foot">
        <span class="big" id="bootms">118ms</span>
        <span class="cap">cold boot to userspace · 5 MiB footprint</span>
      </div>
    </div>
  </div>

  <a class="gh" href="https://github.com/wosahq" target="_blank" rel="noopener" data-reveal style="--d:.58s">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.37.5 0 5.78 0 12.29c0 5.21 3.44 9.63 8.2 11.19.6.11.82-.25.82-.56v-2c-3.34.71-4.04-1.58-4.04-1.58-.55-1.36-1.34-1.73-1.34-1.73-1.09-.73.08-.72.08-.72 1.2.08 1.84 1.21 1.84 1.21 1.07 1.8 2.81 1.28 3.5.98.11-.76.42-1.28.76-1.58-2.67-.3-5.47-1.31-5.47-5.81 0-1.28.47-2.33 1.23-3.15-.12-.3-.53-1.51.12-3.15 0 0 1-.32 3.3 1.2.96-.26 1.98-.39 3-.4 1.02 0 2.04.14 3 .4 2.28-1.52 3.29-1.2 3.29-1.2.65 1.64.24 2.85.12 3.15.77.82 1.23 1.87 1.23 3.15 0 4.51-2.81 5.5-5.49 5.79.43.36.81 1.09.81 2.2v3.26c0 .31.21.68.82.56C20.57 21.91 24 17.5 24 12.29 24 5.78 18.63.5 12 .5z"/></svg>
    github.com/pwnwriter/wosahq
  </a>

</div>

<script>
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // load reveal
  (function(){
    var nodes = document.querySelectorAll('[data-reveal]');
    if(reduce){ nodes.forEach(function(n){n.classList.add('is-in');}); return; }
    requestAnimationFrame(function(){ nodes.forEach(function(n){n.classList.add('is-in');}); });
  })();

  // worlds grid flicker
  (function(){
    var grid = document.getElementById('worlds'); if(!grid) return;
    var cells = [];
    for(var i=0;i<36;i++){ var c=document.createElement('span'); c.className='cell'; grid.appendChild(c); cells.push(c); }
    if(reduce){ cells[7].classList.add('on'); cells[19].classList.add('on'); cells[28].classList.add('on'); return; }
    setInterval(function(){ cells.forEach(function(c){ if(Math.random()>0.88) c.classList.toggle('on'); }); }, 850);
  })();

  // boot number count-up
  (function(){
    var el = document.getElementById('bootms'); if(!el) return;
    if(reduce){ el.textContent='118ms'; return; }
    var target=118, dur=2300, start=null;
    function step(t){ if(!start)start=t; var p=Math.min((t-start)/dur,1);
      el.textContent=Math.round((1-Math.pow(1-p,3))*target)+'ms';
      if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  })();
</script>
</body>
</html>
